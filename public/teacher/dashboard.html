<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>대시보드 · 베이스캠프</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container wide">
    <div class="page-header">
      <div class="title">🏕️ 교사 대시보드</div>
      <div style="display:flex; gap:6px; align-items:center;">
        <a href="/" class="home-btn" title="홈으로">🏠</a>
        <a href="#" class="btn-ghost caption" id="logout">로그아웃</a>
      </div>
    </div>

    <div id="profile" class="caption mb-16"></div>

    <div style="display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" id="new-retreat" style="flex:0 1 auto;">+ 새 수련회 등록</button>
      <select class="input" id="retreat-select" style="flex:1; min-height: 40px; font-size: 14px;"></select>
      <button class="btn btn-outline btn-sm" id="delete-retreat" style="flex:0 1 auto; color: var(--danger); border-color: #F0C2C2;" title="선택한 수련회 삭제">🗑 삭제</button>
    </div>

    <div id="llm-status-banner"></div>

    <div class="alert-banner">
      ℹ 5명 미만 카테고리는 개인정보 보호를 위해 <strong>자동으로 숨겨집니다</strong>. 학생 대화 원문은 교사도 볼 수 없어요.
    </div>

    <div id="dash"></div>
  </div>

  <script type="module">
    import { api, session, toast } from '/js/common.js'
    if (!session.get('teacher')) location.href = '/teacher/login.html'
    const token = session.get('teacher')

    document.getElementById('logout').addEventListener('click', (e) => {
      e.preventDefault()
      session.clear('teacher')
      location.href = '/'
    })

    const MENTOR_NAME = {
      david:'다윗', esther:'에스더', paul:'바울', joseph:'요셉',
      ruth:'룻', daniel:'다니엘', jacob:'야곱', peter:'베드로'
    }
    const CATEGORY_LABEL = {
      family:'가족', friendship:'우정/관계', academic:'진로/학업', faith:'신앙',
      anxiety:'불안/걱정', identity:'자기정체성', general:'일반'
    }
    const CRISIS_LABEL = { 'self-harm':'자해·자살 징후', abuse:'학대·폭력 언급', distress:'심한 좌절·절망' }

    async function init() {
      const me = await api.request('/api/auth/teacher/me', { token })
      document.getElementById('profile').innerHTML =
        `${me.name} · ${me.churchName} <span style="color: var(--success)">● 활성</span>`

      // LLM 키 설정 여부 배너 (교사 전용 키가 없어도 운영자 공용 키로 자동 동작)
      try {
        const s = await api.request('/api/settings/llm', { token })
        const banner = document.getElementById('llm-status-banner')
        if (!s.isConfigured) {
          banner.innerHTML = `
            <div style="padding: 10px 14px; background: #E8F5E9; border: 1px solid #A5D6A7; border-radius: var(--radius-md); margin-bottom: 16px; font-size: 13px; color: #2E7D32;">
              ✓ AI 멘토 자동 연결됨 (공용 Groq Llama 3.3 무료 티어) · 학생들은 바로 대화 가능해요.
              <a href="/teacher/settings.html" style="color: var(--primary-500); text-decoration: underline;">전용 키 등록 →</a>
            </div>
          `
        } else {
          const label = ({groq:'Groq Llama',google:'Google Gemini',anthropic:'Claude'})[s.provider] || s.provider
          banner.innerHTML = `
            <div style="padding: 10px 14px; background: #E8F5E9; border: 1px solid #A5D6A7; border-radius: var(--radius-md); margin-bottom: 16px; font-size: 13px; color: #2E7D32;">
              ✓ 교회 전용 AI 멘토 연결됨 (${label} · ${s.keyHint}) · <a href="/teacher/settings.html" style="color: var(--primary-500); text-decoration: underline;">설정 변경</a>
            </div>
          `
        }
      } catch {}

      const retreats = await api.request('/api/code/retreats', { token })
      const sel = document.getElementById('retreat-select')
      if (retreats.length === 0) {
        sel.innerHTML = '<option>등록된 수련회 없음 — 새로 만들어보세요</option>'
        renderEmpty()
      } else {
        sel.innerHTML = retreats.map((r) => `<option value="${r.id}">${r.title} (${r.startDate} ~ ${r.endDate})</option>`).join('')
        sel.addEventListener('change', () => loadDashboard(sel.value))
        loadDashboard(sel.value)
      }
    }

    function renderEmpty() {
      document.getElementById('dash').innerHTML = `
        <div class="card text-center" style="padding: 40px 20px;">
          <div style="font-size: 48px">🏕️</div>
          <h2 class="mt-8">아직 수련회가 없어요</h2>
          <p class="body" style="color: var(--neutral-700)">"+ 새 수련회 등록" 버튼으로 시작해보세요</p>
        </div>
      `
    }

    async function loadDashboard(retreatId) {
      if (!retreatId) return
      const dash = document.getElementById('dash')
      dash.innerHTML = '<div class="card text-center"><span class="spinner"></span></div>'
      try {
        const r = await api.request(`/api/insights/dashboard/${retreatId}`, { token })
        render(r)
      } catch (e) {
        dash.innerHTML = '<div class="card error-msg">대시보드 로드 실패</div>'
      }
    }

    function render({ retreat, insights }) {
      const {
        totalStudents, activeStudents, participationRate,
        categoryCounts, mentorPreference, sentimentTrend, crisisAlerts
      } = insights

      const crisisVisible = crisisAlerts.filter((a) => !a.hidden)
      const crisisHidden = crisisAlerts.filter((a) => a.hidden)

      const maxMentor = Math.max(1, ...mentorPreference.map((m) => m.count))
      const maxCategory = Math.max(1, ...categoryCounts.filter((c) => !c.hidden).map((c) => c.count || 0))
      const totalMsgs = insights.totalMessages || 0

      const sentHtml = sentimentTrend.length === 0 ? '<p class="caption">아직 데이터가 없어요</p>' :
        sentimentTrend.map((s) => `
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
            <div class="caption" style="width: 80px">${s.day}</div>
            <div style="flex:1">
              <div class="bar"><div class="bar-fill" style="width: ${Math.max(5, (s.avg + 2) * 25)}%"></div></div>
            </div>
            <div class="caption" style="width: 40px; text-align: right;">${s.avg > 0.3 ? '☀️' : s.avg > -0.3 ? '⛅' : s.avg > -1 ? '🌧️' : '⛈️'}</div>
          </div>
        `).join('')

      const codeValue = retreat.inviteCode?.code || ''
      const studentUrl = `${location.origin}/student/enter.html`
      document.getElementById('dash').innerHTML = `
        <div class="card">
          <h2>📍 ${retreat.title}</h2>
          <p class="caption">${retreat.startDate} ~ ${retreat.endDate} · 예상 ${retreat.expectedParticipants}명</p>

          <div class="invite-code-box">
            <div class="label">🎟️ 학생들에게 공유할 입장코드</div>
            <div class="code-display" id="code-value">${codeValue || '코드 발급 중…'}</div>
            <div class="actions">
              <button class="btn btn-primary" onclick="copyCode('${codeValue}')">📋 코드 복사</button>
              <button class="btn btn-outline" onclick="copyLink('${studentUrl}', '${codeValue}')">🔗 학생 안내 링크 복사</button>
              <a class="btn btn-outline" href="/student/enter.html" target="_blank">👀 학생 화면 미리보기</a>
            </div>
            <div class="hint">학생은 이 코드만 있으면 이름 없이 익명으로 입장해요. 카톡/문자로 공유해 주세요.</div>
          </div>
        </div>

        <div class="dashboard-grid">
          <div class="stat-card">
            <div class="label">참여율</div>
            <div class="value">${Math.round(participationRate * 100)}%</div>
            <div class="sub">${activeStudents}/${totalStudents}명 대화 시작</div>
          </div>
          <div class="stat-card">
            <div class="label">위기 신호 알림</div>
            <div class="value ${crisisVisible.length > 0 ? 'alert' : ''}">${crisisVisible.reduce((s, a) => s + a.count, 0)}</div>
            <div class="sub">카테고리만 표시, 원문 비공개</div>
          </div>
        </div>

        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
            <h2 style="margin: 0;">💭 학생들이 털어놓은 마음</h2>
            <button class="btn btn-sm btn-primary" id="btn-ai-summary" style="width: auto; padding: 8px 14px; min-height: 36px; font-size: 13px;">🤖 AI 수련회 반영 분석</button>
          </div>
          <p class="caption mt-8 mb-16">카테고리를 클릭하면 해당 영역의 키워드와 감정 분포를 볼 수 있어요.</p>

          <div class="category-bubbles">
            ${categoryCounts.length === 0
              ? '<p class="caption">아직 데이터가 없어요</p>'
              : categoryCounts.map((c) => {
                  const pct = totalMsgs ? Math.round((c.count || 0) / totalMsgs * 100) : 0
                  return c.hidden
                    ? `<div class="cat-bubble" style="opacity: 0.5; cursor: default;">${CATEGORY_LABEL[c.category] || c.category} <span class="pct">🔒 소수</span></div>`
                    : `<div class="cat-bubble" data-cat="${c.category}">${CATEGORY_LABEL[c.category] || c.category} <span class="pct">${c.count}명 · ${pct}%</span></div>`
                }).join('')
            }
          </div>

          <div id="cat-detail"></div>
        </div>

        <div class="card">
          <h2>🔑 핵심 키워드 구름</h2>
          <p class="caption mb-16">청소년들이 자주 언급한 단어 (큰 글자 = 자주). 최소 ${insights.kAnonymityThreshold ? Math.max(2, Math.ceil(insights.kAnonymityThreshold/2)) : 2}명 이상이 쓴 단어만 표시.</p>
          ${(!insights.topKeywords || insights.topKeywords.length === 0)
            ? '<p class="caption">아직 집계할 키워드가 충분하지 않아요. 대화가 쌓이면 자동으로 나타납니다.</p>'
            : `<div class="keyword-cloud">
                ${insights.topKeywords.map((k) => {
                  const maxC = insights.topKeywords[0].count
                  const size = 12 + Math.round((k.count / maxC) * 14)
                  const opacity = 0.5 + (k.count / maxC) * 0.5
                  return `<span class="keyword-chip" data-kw="${k.keyword}" data-cat="${k.topCategory}" style="font-size: ${size}px; opacity: ${opacity};">${k.keyword}<span class="count">·${k.count}</span></span>`
                }).join('')}
              </div>`
          }
        </div>

        <div class="card hidden" id="ai-summary-card">
          <h2>🤖 AI 수련회 반영 분석</h2>
          <p class="caption mb-8">집계 데이터만으로 생성 (원문 메시지 사용 안 함)</p>
          <div id="ai-summary-content" class="ai-summary"></div>
        </div>

        <div class="card">
          <h2>⛺ 멘토별 선호도</h2>
          ${mentorPreference.length === 0 ? '<p class="caption">아직 데이터가 없어요</p>' :
            mentorPreference.map((m) => `
              <div style="margin-bottom: 8px">
                <div style="display:flex; justify-content:space-between;"><span>${MENTOR_NAME[m.mentorId] || m.mentorId}</span><strong>${m.count}회</strong></div>
                <div class="bar"><div class="bar-fill" style="width: ${(m.count / maxMentor) * 100}%"></div></div>
              </div>
            `).join('')}
        </div>

        <div class="card">
          <h2>🌤️ 감정 트렌드 (일자별)</h2>
          ${sentHtml}
        </div>

        <div class="card" id="crisis-card" style="background: ${crisisVisible.length > 0 ? '#FDECEC' : 'white'}">
          <h2>⚠️ 위기 신호 알림</h2>
          <p class="caption mb-16">학생의 원문 메시지는 <strong>절대 표시되지 않습니다</strong>. 아래는 카테고리별 집계만 보여줘요.</p>

          <details style="margin-bottom: 14px; font-size: 13px; background: white; border: 1px solid var(--neutral-100); border-radius: var(--radius-md); padding: 10px 14px;">
            <summary style="cursor: pointer; color: var(--neutral-700); font-weight: 600; user-select: none;">
              ⓘ 어떤 단어를 위기 신호로 감지하나요? <span style="color: var(--neutral-500); font-weight: 400;">— 접기/펼치기</span>
            </summary>
            <div style="margin-top: 12px; line-height: 1.7;">
              <div style="margin-bottom: 12px;">
                <strong style="color: var(--danger);">🆘 자해·자살 징후</strong>
                <div class="caption" style="margin-top: 3px;">
                  자기 자신을 해치려는 직·간접 표현. 예: "죽고 싶어", "사라지고 싶어", "뛰어내리", "손목", "유서", "극단적 선택", "살기 싫어"
                </div>
              </div>
              <div style="margin-bottom: 12px;">
                <strong style="color: #8F5A12;">🛡️ 학대·폭력 언급</strong>
                <div class="caption" style="margin-top: 3px;">
                  가정·학교·관계에서 폭력을 당한 경험. 예: "맞았어", "때렸어", "가정폭력", "학대", "성추행", "성폭행", "아빠가/엄마가/선생님이 때"
                </div>
              </div>
              <div style="margin-bottom: 10px;">
                <strong style="color: var(--warning);">😔 심한 좌절·절망</strong>
                <div class="caption" style="margin-top: 3px;">
                  출구 없는 무의미·포기 표현. 예: "더 이상 못", "다 끝내", "의미 없어", "때려주고 싶어"
                </div>
              </div>
              <div style="border-top: 1px solid var(--neutral-100); padding-top: 10px; margin-top: 10px;">
                <strong style="color: var(--danger);">🚨 긴급 신호 (즉시 에스컬레이션)</strong>
                <div class="caption" style="margin-top: 3px;">
                  "오늘 죽", "지금 죽", "바로 뛰어내리", "유서 썼어" 등 즉각 행동을 암시하는 표현은 관리자에게 별도 알림이 전송됩니다.
                </div>
              </div>
              <p class="caption" style="margin-top: 12px; padding: 8px 10px; background: var(--primary-50); border-radius: 6px;">
                💡 이 목록은 대표 예시입니다. 문맥을 함께 판단해 AI가 추가 키워드도 감지합니다. 감지 건수만 표시되며 원문·닉네임·시점은 비공개입니다.
              </p>
            </div>
          </details>

          ${crisisVisible.length === 0
            ? '<p class="success-msg">✓ 현재 보고된 위기 신호가 없어요</p>'
            : crisisVisible.map((a) => `
              <div class="danger-banner">
                <strong>${CRISIS_LABEL[a.category] || a.category}</strong> · ${a.count}건
                <br /><span class="caption">→ <a href="/teacher/guide.html?cat=${a.category}" style="color: var(--primary-500)">상담 가이드 보기</a></span>
              </div>`).join('')}
          ${crisisHidden.length > 0 ? `<p class="caption mt-8">🔒 소수 사례 ${crisisHidden.length}건은 개인정보 보호를 위해 비공개 (관리자에게만 에스컬레이션)</p>` : ''}
        </div>
      `

      // 카테고리 클릭 → 드릴다운
      document.querySelectorAll('.cat-bubble[data-cat]').forEach((el) => {
        el.addEventListener('click', () => {
          const cat = el.dataset.cat
          document.querySelectorAll('.cat-bubble').forEach((b) => b.classList.remove('active'))
          el.classList.add('active')
          renderCategoryDetail(cat, insights, retreat.id)
        })
      })

      // 키워드 클릭 → 해당 카테고리 드릴다운
      document.querySelectorAll('.keyword-chip').forEach((el) => {
        el.addEventListener('click', () => {
          const cat = el.dataset.cat
          const target = document.querySelector(`.cat-bubble[data-cat="${cat}"]`)
          if (target) target.click()
          target?.scrollIntoView({ behavior: 'smooth', block: 'center' })
        })
      })

      // AI 요약 버튼
      document.getElementById('btn-ai-summary')?.addEventListener('click', async () => {
        await loadAISummary(retreat.id)
      })
    }

    function renderCategoryDetail(category, insights, retreatId) {
      const host = document.getElementById('cat-detail')
      const CAT = CATEGORY_LABEL[category] || category
      const sent = insights.sentimentByCategory?.[category] || { positive: 0, neutral: 0, negative: 0, crisis: 0 }
      const total = (sent.positive || 0) + (sent.neutral || 0) + (sent.negative || 0) + (sent.crisis || 0)
      const pct = (n) => total ? Math.round(n / total * 100) : 0
      const keywords = insights.keywordsByCategory?.[category] || []
      const kwHtml = keywords.length === 0
        ? '<p class="caption">이 영역에서 집계된 키워드가 아직 부족해요.</p>'
        : `<div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;">
            ${keywords.slice(0, 20).map(k => `<span class="chip" style="background: white; border: 1px solid var(--primary-100);">${k.keyword}<span style="opacity:0.6; margin-left:4px; font-size:10px;">·${k.count}</span></span>`).join('')}
          </div>`

      host.innerHTML = `
        <div class="category-detail">
          <h3>📍 "${CAT}" 영역 상세</h3>
          ${total > 0 ? `
            <div class="sent-bar" title="감정 분포">
              ${sent.positive ? `<div class="seg pos" style="width:${pct(sent.positive)}%"></div>` : ''}
              ${sent.neutral ? `<div class="seg neu" style="width:${pct(sent.neutral)}%"></div>` : ''}
              ${sent.negative ? `<div class="seg neg" style="width:${pct(sent.negative)}%"></div>` : ''}
              ${sent.crisis ? `<div class="seg cri" style="width:${pct(sent.crisis)}%"></div>` : ''}
            </div>
            <div class="sent-legend">
              <span><span class="dot" style="background: var(--success)"></span>긍정 ${pct(sent.positive)}%</span>
              <span><span class="dot" style="background: var(--neutral-300)"></span>중립 ${pct(sent.neutral)}%</span>
              <span><span class="dot" style="background: var(--warning)"></span>부정 ${pct(sent.negative)}%</span>
              ${sent.crisis ? `<span><span class="dot" style="background: var(--danger)"></span>위기 ${pct(sent.crisis)}%</span>` : ''}
            </div>
          ` : ''}
          <div style="margin-top: 10px;"><strong style="font-size: 13px;">자주 언급된 키워드</strong></div>
          ${kwHtml}
        </div>
      `
    }

    async function loadAISummary(retreatId) {
      const btn = document.getElementById('btn-ai-summary')
      const card = document.getElementById('ai-summary-card')
      const content = document.getElementById('ai-summary-content')
      btn.disabled = true
      const originalHtml = btn.innerHTML
      btn.innerHTML = '<span class="spinner"></span> 분석 중…'
      card.classList.remove('hidden')
      content.textContent = 'AI가 분석 중입니다…'
      try {
        const r = await api.request(`/api/insights/summary/${retreatId}`, { token })
        content.textContent = r.summary
        card.scrollIntoView({ behavior: 'smooth', block: 'center' })
      } catch (e) {
        content.textContent = '분석 생성에 실패했어요. 잠시 후 다시 시도해 주세요.'
      } finally {
        btn.disabled = false
        btn.innerHTML = originalHtml
      }
    }

    // 수련회 삭제
    document.getElementById('delete-retreat').addEventListener('click', async () => {
      const sel = document.getElementById('retreat-select')
      const retreatId = sel.value
      const title = sel.options[sel.selectedIndex]?.text || '수련회'
      if (!retreatId) return toast('삭제할 수련회가 없어요', 'error')
      const ok = confirm(
        `정말로 "${title}"을(를) 삭제할까요?\n\n` +
        `⚠️ 학생 세션·대화·인사이트·입장코드가 모두 영구 삭제됩니다.\n이 작업은 되돌릴 수 없습니다.`
      )
      if (!ok) return
      try {
        await api.request(`/api/code/retreat/${retreatId}`, { method: 'DELETE', token })
        toast('수련회 삭제 완료')
        init()
      } catch (e) {
        toast('삭제 실패: ' + (e?.data?.error || e.message), 'error')
      }
    })

    // 복사 기능
    window.copyCode = async (code) => {
      if (!code) return toast('코드가 아직 없어요', 'error')
      try { await navigator.clipboard.writeText(code); toast(`코드 복사됨: ${code}`) }
      catch { toast('복사 실패 — 길게 눌러 선택 후 복사해 주세요', 'error') }
    }
    window.copyLink = async (url, code) => {
      if (!code) return toast('코드가 아직 없어요', 'error')
      const text = `[베이스캠프 수련회 안내]\n1) 아래 링크 접속\n${url}\n2) 입장코드 입력: ${code}\n\n이름 없이 익명으로 참여할 수 있어요.`
      try { await navigator.clipboard.writeText(text); toast('안내 메시지 복사 완료!') }
      catch { toast('복사 실패', 'error') }
    }

    // 새 수련회 등록 모달
    document.getElementById('new-retreat').addEventListener('click', async () => {
      // AI 연결이 전혀 안 된 경우에만 경고 (교사 키 없음 + 공용 키도 없음)
      try {
        const s = await api.request('/api/settings/llm', { token })
        if (!s.isConfigured && !s.operatorFallbackAvailable) {
          if (confirm('⚠️ AI 멘토가 연결되지 않았어요.\n\n수련회는 등록할 수 있지만 학생 대화는 작동하지 않습니다. 먼저 설정 페이지에서 API 키를 등록하시겠어요?\n\n(확인=설정 페이지로 이동 / 취소=그냥 수련회 등록)')) {
            location.href = '/teacher/settings.html'
            return
          }
        }
      } catch {}
      const html = `
        <div class="modal-backdrop" id="rt-modal">
          <div class="modal">
            <h2 style="color: var(--neutral-900)">🏕️ 새 수련회 등록</h2>
            <div class="field mt-16">
              <label class="input-label">수련회 이름</label>
              <input class="input" id="rt-title" placeholder="예: 2026 여름 고등부 수련회" />
            </div>
            <div class="field">
              <label class="input-label">시작일</label>
              <input class="input" id="rt-start" type="date" />
            </div>
            <div class="field">
              <label class="input-label">종료일</label>
              <input class="input" id="rt-end" type="date" />
            </div>
            <div class="field">
              <label class="input-label">예상 참석 인원</label>
              <input class="input" id="rt-count" type="number" min="1" max="2000" value="50" />
            </div>
            <p class="error-msg hidden" id="rt-err"></p>
            <div style="display:flex; gap:8px; margin-top:16px;">
              <button class="btn btn-outline btn-sm" onclick="document.getElementById('rt-modal').remove()">취소</button>
              <button class="btn btn-primary btn-sm" id="rt-submit">등록 · 코드 받기</button>
            </div>
          </div>
        </div>
      `
      document.body.insertAdjacentHTML('beforeend', html)
      document.getElementById('rt-submit').addEventListener('click', async () => {
        const title = document.getElementById('rt-title').value.trim()
        const startDate = document.getElementById('rt-start').value
        const endDate = document.getElementById('rt-end').value
        const expectedParticipants = Number(document.getElementById('rt-count').value)
        const err = document.getElementById('rt-err')
        if (!title || !startDate || !endDate || !expectedParticipants) { err.textContent='모두 입력해 주세요'; err.classList.remove('hidden'); return }
        try {
          const r = await api.request('/api/code/retreat', { method: 'POST', token, body: { title, startDate, endDate, expectedParticipants } })
          document.getElementById('rt-modal').remove()
          toast(`입장코드 발급: ${r.code.code}`)
          init()
        } catch (e) {
          err.textContent = '등록 중 문제가 생겼어요.'
          err.classList.remove('hidden')
        }
      })
    })

    init().catch(() => { session.clear('teacher'); location.href = '/teacher/login.html' })
  </script>
</body>
</html>

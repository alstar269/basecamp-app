<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>관리자 · 베이스캠프</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container wide">
    <div class="page-header">
      <div class="title">🛠️ 관리자 콘솔</div>
      <div style="display:flex; gap:6px; align-items:center;">
        <a href="/" class="home-btn" title="홈으로">🏠</a>
        <a href="#" class="btn-ghost caption" id="logout">로그아웃</a>
      </div>
    </div>

    <h2>📊 전체 통계</h2>
    <div class="dashboard-grid" id="stats"></div>

    <h2 class="mt-24">⛪ 교회 승인</h2>
    <div id="churches"></div>

    <h2 class="mt-24">📋 전체 수련회 관리</h2>
    <div id="retreats-toolbar" class="hidden" style="display:flex; align-items:center; gap:12px; padding: 10px 14px; background: var(--primary-50); border-radius: var(--radius-md); margin-bottom: 12px; flex-wrap: wrap;">
      <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="checkbox" id="select-all-retreats" style="width:18px; height:18px; cursor:pointer;" />
        <span style="font-size: 14px;">전체 선택</span>
      </label>
      <span id="selection-count" class="caption" style="flex:1;"></span>
      <button class="btn btn-sm" id="bulk-delete" style="background: var(--danger); color: white; min-height: 36px; padding: 6px 16px; flex: 0 0 auto;" disabled>🗑 선택 삭제</button>
    </div>
    <div id="retreats"></div>

    <h2 class="mt-24">👥 멘토 목록</h2>
    <div id="mentors"></div>

    <h2 class="mt-24">🗑️ 데이터 보존 관리</h2>
    <div class="card">
      <p class="body">수련회 종료 +30일 경과한 데이터는 자동으로 파기됩니다.</p>
      <p class="caption mb-16">수동으로 지금 실행하려면 아래 버튼을 눌러주세요 (주로 디버깅 용도).</p>
      <button class="btn btn-outline btn-sm" id="retention">지금 보존 스윕 실행</button>
    </div>
  </div>

  <script type="module">
    import { api, session, toast } from '/js/common.js'
    if (!session.get('admin')) location.href = '/admin/login.html'
    const token = session.get('admin')

    document.getElementById('logout').addEventListener('click', (e) => {
      e.preventDefault()
      session.clear('admin')
      location.href = '/'
    })

    async function load() {
      try {
        const [stats, churches, mentors, retreats] = await Promise.all([
          api.request('/api/admin/stats', { token }),
          api.request('/api/admin/churches', { token }),
          api.request('/api/admin/mentors', { token }),
          api.request('/api/admin/retreats', { token })
        ])

        document.getElementById('stats').innerHTML = `
          <div class="stat-card"><div class="label">교회</div><div class="value">${stats.churches}</div><div class="sub">승인 대기 ${stats.churchesPending}</div></div>
          <div class="stat-card"><div class="label">수련회</div><div class="value">${stats.retreats}</div><div class="sub">진행 중 ${stats.retreatsActive}</div></div>
          <div class="stat-card"><div class="label">학생 세션</div><div class="value">${stats.students}</div><div class="sub">대화 ${stats.conversations}개</div></div>
          <div class="stat-card"><div class="label">위기 알림</div><div class="value ${stats.crisisAlerts > 0 ? 'alert' : ''}">${stats.crisisAlerts}</div><div class="sub">집계 건수</div></div>
        `

        const statusColor = { pending: 'var(--warning)', approved: 'var(--success)', rejected: 'var(--danger)' }
        const statusLabel = { pending: '승인 대기', approved: '승인됨', rejected: '반려' }
        document.getElementById('churches').innerHTML = churches.length === 0
          ? '<div class="card caption">등록된 교회가 없습니다.</div>'
          : churches.map((c) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap: wrap;">
              <div style="flex:1; min-width: 180px;">
                <strong>${c.name}</strong>
                <div class="caption">등록: ${new Date(c.createdAt).toLocaleDateString('ko-KR')} · <span style="color:${statusColor[c.status]}">● ${statusLabel[c.status]}</span></div>
              </div>
              <div style="display:flex; gap:6px; flex: 0 0 auto;">
                ${c.status === 'pending' ? `
                  <button class="btn btn-sm btn-primary" onclick="approve('${c.id}')">승인</button>
                  <button class="btn btn-sm btn-outline" onclick="reject('${c.id}')">반려</button>
                ` : ''}
                <button class="btn btn-sm" style="color: var(--danger); border: 1.5px solid #F0C2C2; background: white; min-height: 34px; padding: 4px 12px; font-size: 13px;" onclick="deleteChurch('${c.id}', '${(c.name || '').replace(/'/g, "\\'")}')">🗑 삭제</button>
              </div>
            </div>
          `).join('')

        const toolbar = document.getElementById('retreats-toolbar')
        if (retreats.length === 0) {
          toolbar.classList.add('hidden')
          document.getElementById('retreats').innerHTML = '<div class="card caption">등록된 수련회가 없습니다.</div>'
        } else {
          toolbar.classList.remove('hidden')
          document.getElementById('retreats').innerHTML = retreats.map((r) => `
            <div class="card retreat-row" data-id="${r.id}" data-title="${(r.title || '').replace(/"/g, '&quot;')}" data-count="${r.studentCount}" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
              <input type="checkbox" class="retreat-check" style="width:18px; height:18px; cursor:pointer; flex: 0 0 auto;" />
              <div style="flex:1; min-width:200px;">
                <strong>${r.title}</strong>
                <div class="caption">
                  📅 ${r.startDate} ~ ${r.endDate} · 👥 학생 ${r.studentCount}명 · 🎟️ ${r.inviteCode || '—'}
                </div>
                <div class="caption">
                  🏛️ ${r.churchName || '—'} · ✉️ ${r.teacherEmail || '—'}
                  · <span style="font-family: monospace; opacity: 0.6; font-size: 10px;">${r.id.slice(0, 8)}</span>
                </div>
              </div>
              <button class="btn btn-sm" style="color: var(--danger); border: 1.5px solid #F0C2C2; background: white; flex: 0 0 auto; min-height: 34px; padding: 4px 12px; font-size: 13px;" onclick="deleteRetreat('${r.id}', '${(r.title || '').replace(/'/g, "\\'")}', ${r.studentCount})">🗑 삭제</button>
            </div>
          `).join('')
          bindRetreatSelection()
        }

        document.getElementById('mentors').innerHTML = `
          <div class="mentor-grid">
            ${mentors.map((m) => `
              <div class="mentor-card">
                <div class="icon" style="background:${m.color}">${m.icon}</div>
                <div class="name">${m.name}</div>
                <div class="title">${m.title}</div>
                <div class="tags">${m.tags.map((t) => `<span class="chip">${t}</span>`).join('')}</div>
              </div>
            `).join('')}
          </div>
          <p class="caption mt-8">ℹ 멘토 프롬프트 편집은 현재 코드 기반 (<code>lib/mentors.js</code>). 추후 UI 제공 예정.</p>
        `
      } catch (e) {
        session.clear('admin')
        location.href = '/admin/login.html'
      }
    }

    function bindRetreatSelection() {
      const checks = document.querySelectorAll('.retreat-check')
      const selectAll = document.getElementById('select-all-retreats')
      const bulkBtn = document.getElementById('bulk-delete')
      const countLabel = document.getElementById('selection-count')

      function updateUI() {
        const selected = Array.from(checks).filter((c) => c.checked)
        countLabel.textContent = selected.length > 0 ? `${selected.length}개 선택됨` : ''
        bulkBtn.disabled = selected.length === 0
        selectAll.checked = selected.length === checks.length && checks.length > 0
        selectAll.indeterminate = selected.length > 0 && selected.length < checks.length
      }

      checks.forEach((c) => c.addEventListener('change', updateUI))
      selectAll.onchange = () => {
        checks.forEach((c) => { c.checked = selectAll.checked })
        updateUI()
      }
      bulkBtn.onclick = async () => {
        const rows = Array.from(document.querySelectorAll('.retreat-row'))
          .filter((r) => r.querySelector('.retreat-check').checked)
        const ids = rows.map((r) => r.dataset.id)
        const totalStudents = rows.reduce((s, r) => s + Number(r.dataset.count || 0), 0)
        const msg = `${ids.length}개 수련회를 일괄 삭제할까요?\n\n` +
                    (totalStudents > 0 ? `⚠️ 학생 세션 ${totalStudents}건도 모두 영구 삭제됩니다.\n` : '') +
                    `되돌릴 수 없습니다.`
        if (!confirm(msg)) return
        try {
          const r = await api.request('/api/admin/retreats/bulk-delete', { method: 'POST', token, body: { ids } })
          toast(`${r.deleted}개 삭제 완료`)
          load()
        } catch (e) {
          toast('삭제 실패: ' + (e?.data?.error || e.message), 'error')
        }
      }
      updateUI()
    }

    window.deleteRetreat = async (id, title, count) => {
      const msg = count > 0
        ? `"${title}"을(를) 삭제할까요?\n\n⚠️ 이 수련회엔 학생 ${count}명의 세션이 있습니다. 모두 영구 삭제됩니다.`
        : `"${title}"을(를) 삭제할까요?`
      if (!confirm(msg)) return
      try {
        await api.request(`/api/admin/retreats/${id}`, { method: 'DELETE', token })
        toast(`삭제 완료: ${title}`)
        load()
      } catch (e) {
        toast('삭제 실패: ' + (e?.data?.error || e.message), 'error')
      }
    }
    window.deleteChurch = async (id, name) => {
      const typed = prompt(
        `⚠️ 위험: "${name}" 교회를 삭제하면\n` +
        `소속 교사 계정 · 수련회 · 학생 세션 · 대화 · 모든 인사이트가\n` +
        `영구히 사라집니다. 되돌릴 수 없어요.\n\n` +
        `계속하려면 교회 이름을 정확히 입력하세요:`
      )
      if (typed === null) return
      if (typed !== name) {
        toast('이름이 일치하지 않아 취소됨', 'error')
        return
      }
      try {
        await api.request(`/api/admin/churches/${id}`, { method: 'DELETE', token })
        toast(`교회 삭제: ${name}`)
        load()
      } catch (e) {
        toast('삭제 실패: ' + (e?.data?.error || e.message), 'error')
      }
    }
    window.approve = async (id) => {
      await api.request(`/api/admin/churches/${id}/approve`, { method: 'POST', token })
      toast('승인 완료')
      load()
    }
    window.reject = async (id) => {
      await api.request(`/api/admin/churches/${id}/reject`, { method: 'POST', token })
      toast('반려 처리됨')
      load()
    }
    document.getElementById('retention').addEventListener('click', async () => {
      const r = await api.request('/api/admin/retention/run', { method: 'POST', token })
      toast(`파기 대상 ${r.purged}건 처리`)
    })

    load()
  </script>
</body>
</html>

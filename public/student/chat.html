<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>대화 · 베이스캠프</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/gowun-dodum@5.0.8/index.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <a class="sos-btn" href="#" onclick="openSOS(); return false" aria-label="긴급 도움">🆘</a>
  <div class="container">
    <div class="page-header">
      <a href="/student/mentors.html" class="back">←</a>
      <div class="title" id="mentor-title">멘토</div>
      <a href="/" class="home-btn" title="홈으로">🏠</a>
    </div>

    <div id="chat" class="chat-wrap"></div>
  </div>

  <div class="chat-input-bar">
    <form id="chat-form">
      <textarea id="msg" placeholder="마음속 이야기를 편하게 들려줘…" rows="1"></textarea>
      <button class="chat-send" type="submit" aria-label="전송">↑</button>
    </form>
  </div>

  <script type="module">
    import { api, session, openHotlineModal } from '/js/common.js'
    window.openSOS = openHotlineModal

    if (!session.get('student')) location.href = '/student/enter.html'

    const MENTOR_INFO = {
      david: { name:'다윗', icon:'🎵' },
      esther: { name:'에스더', icon:'👑' },
      paul: { name:'바울', icon:'✉️' },
      joseph: { name:'요셉', icon:'🌈' },
      ruth: { name:'룻', icon:'🌾' },
      daniel: { name:'다니엘', icon:'🦁' },
      jacob: { name:'야곱', icon:'🪜' },
      peter: { name:'베드로', icon:'🎣' }
    }
    const params = new URLSearchParams(location.search)
    const mentorId = params.get('mentor')
    const info = MENTOR_INFO[mentorId]
    if (!info) location.href = '/student/mentors.html'
    document.getElementById('mentor-title').textContent = `${info.icon} ${info.name}`

    const chat = document.getElementById('chat')
    let conversationId = null

    function addBubble(role, text) {
      const div = document.createElement('div')
      div.className = 'bubble ' + (role === 'user' ? 'bubble-user' : role === 'system' ? 'bubble-system' : 'bubble-mentor')
      div.textContent = text
      chat.appendChild(div)
      window.scrollTo(0, document.body.scrollHeight)
    }

    // 받침 유무에 따른 종결어미 (바울 → 바울이야 / 베드로 → 베드로야)
    function copula(name) {
      const last = name.charCodeAt(name.length - 1)
      const hasBatchim = (last - 0xAC00) % 28 !== 0
      return hasBatchim ? '이야' : '야'
    }
    // 첫 인사 (메시지로 저장하지 않고 UX로만)
    addBubble('mentor', `안녕, ${info.icon} ${info.name}${copula(info.name)}. 편하게 이야기 시작해도 돼.`)

    const form = document.getElementById('chat-form')
    const msgInput = document.getElementById('msg')
    msgInput.addEventListener('input', () => {
      msgInput.style.height = 'auto'
      msgInput.style.height = Math.min(120, msgInput.scrollHeight) + 'px'
    })

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const text = msgInput.value.trim()
      if (!text) return
      addBubble('user', text)
      msgInput.value = ''
      msgInput.style.height = 'auto'

      const loading = document.createElement('div')
      loading.className = 'bubble bubble-mentor'
      loading.innerHTML = '<span class="spinner"></span>'
      chat.appendChild(loading)

      try {
        // null이면 필드 제거 (zod .optional() 호환 + defensive)
        const body = { mentorId, text }
        if (conversationId) body.conversationId = conversationId
        const r = await api.request('/api/chat/send', {
          method: 'POST',
          token: session.get('student'),
          body
        })
        conversationId = r.conversationId
        loading.remove()
        addBubble('mentor', r.reply)
        if (r.crisis) {
          addBubble('system', '⚠️ 지금 많이 힘들어 보여. 상단 🆘 버튼을 누르면 전문 상담 연락처를 볼 수 있어.')
        }
      } catch (err) {
        loading.remove()
        const reason = err?.data?.error || err?.message || ''
        const serverMsg = err?.data?.message

        // 서버가 보내준 친절한 메시지가 있으면 우선 사용
        let msg = serverMsg || '잠시 연결이 불안정해. 다시 시도해 줘.'

        // 특수 케이스 덧입힘
        if (reason === 'mentor_not_configured') {
          msg = '🔧 담당 선생님이 아직 AI 멘토 연결을 설정하지 않았어. 선생님께 "설정 페이지에서 Gemini 키 등록 부탁드려요"라고 말씀드려 줘.'
        } else if (reason === 'rate_limited') {
          msg = '⏳ 잠깐만, 지금 멘토가 너무 바빠. 1-2분 뒤 다시 이야기해 줘.'
        } else if (reason === 'safety_blocked') {
          msg = '조금 다른 방식으로 이야기해 볼까? 같은 마음을 다른 말로 표현해 줘.'
        } else if (reason === 'key_invalid') {
          msg = '🔧 선생님의 AI 키가 유효하지 않아. 선생님께 "설정에서 Gemini 키 재등록 부탁드려요"라고 전해 줘.'
        } else if (reason === 'mentor_unavailable') {
          msg = '⏳ 멘토가 지금 답을 못하고 있어. 1~2분 뒤 다시 시도해 줘.'
        } else if (reason === 'key_decrypt_failed') {
          msg = '⚙️ 서버 설정 문제로 멘토를 부를 수 없어. 선생님께 알려줘.'
        } else if (err?.status === 401) {
          msg = '세션이 만료됐어. 랜딩 페이지로 돌아가 다시 입장해 줘.'
        } else if (err?.status === 429) {
          msg = '⏳ 잠깐만, 너무 빨리 메시지가 오고 있어. 잠시 뒤에 다시 말해 줘.'
        }
        // 디버그용: 실제 에러 함께 표시 (개발 중에만, 나중에 제거 가능)
        if (err?.data?.debug) msg += `\n\n[기술: ${err.data.debug.slice(0, 200)}]`
        addBubble('system', msg)
      }
    })
  </script>
</body>
</html>

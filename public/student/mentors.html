<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>멘토 선택 · 베이스캠프</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <a class="sos-btn" href="#" onclick="openSOS(); return false" aria-label="긴급 도움">🆘</a>
  <div class="container">
    <div class="page-header">
      <a href="/student/setup.html" class="back">←</a>
      <div class="title">멘토 선택</div>
      <div style="display:flex; gap:6px; align-items:center;">
        <a href="/student/journey.html" class="action" style="color: var(--primary-500); font-size: 13px;">내 여정</a>
        <a href="/" class="home-btn" title="홈으로">🏠</a>
      </div>
    </div>

    <div class="text-center mb-16">
      <h1>🧭 오늘 함께 걸을 멘토를 골라보세요</h1>
      <p class="body" style="color: var(--neutral-700)">언제든 다른 멘토로 바꿀 수 있어요</p>
    </div>

    <div class="mentor-grid" id="grid"></div>
  </div>

  <script type="module">
    import { api, session, openHotlineModal } from '/js/common.js'
    window.openSOS = openHotlineModal

    if (!session.get('student')) location.href = '/student/enter.html'

    const MENTORS = [
      { id:'david', name:'다윗', title:'흔들려도 괜찮아', icon:'🎵', color:'#B8A9F0', tags:['감정','상처','외로움'], topics:['identity','anxiety'] },
      { id:'esther', name:'에스더', title:'한 걸음 내딛어', icon:'👑', color:'#F4B860', tags:['용기','진로','결단'], topics:['academic','identity'] },
      { id:'paul', name:'바울', title:'약할 때 강해져', icon:'✉️', color:'#E8E1FA', tags:['변화','고난','사명'], topics:['faith','identity'] },
      { id:'joseph', name:'요셉', title:'꿈은 포기하지 마', icon:'🌈', color:'#FFE7A3', tags:['가족','용서','꿈'], topics:['family','academic'] },
      { id:'ruth', name:'룻', title:'곁에 있어줄게', icon:'🌾', color:'#ABDBC4', tags:['우정','소속감','상실'], topics:['friendship','family'] },
      { id:'daniel', name:'다니엘', title:'휘둘리지 않을 중심', icon:'🦁', color:'#FFE7A3', tags:['정체성','유혹','또래'], topics:['identity','friendship'] },
      { id:'jacob', name:'야곱', title:'이름이 바뀐 사람', icon:'🪜', color:'#E8E1FA', tags:['정체성','성장','변화'], topics:['identity','family'] },
      { id:'peter', name:'베드로', title:'넘어져도 다시', icon:'🎣', color:'#B8A9F0', tags:['실패','회복','용서'], topics:['identity','faith'] }
    ]

    const mood = sessionStorage.getItem('basecamp.student.mood') || ''
    function recommended(m) {
      if (mood === 'storm') return ['david', 'peter', 'paul'].includes(m.id)
      if (mood === 'rainy') return ['ruth', 'david', 'peter'].includes(m.id)
      if (mood === 'cloudy') return ['daniel', 'jacob', 'esther'].includes(m.id)
      if (mood === 'sunny') return ['esther', 'joseph', 'paul'].includes(m.id)
      return false
    }

    const grid = document.getElementById('grid')
    MENTORS.forEach((m) => {
      const rec = recommended(m)
      const div = document.createElement('div')
      div.className = 'mentor-card' + (rec ? ' recommended' : '')
      div.innerHTML = `
        ${rec ? '<div class="recommend-badge">✨</div>' : ''}
        <div class="icon" style="background: ${m.color}">${m.icon}</div>
        <div class="name">${m.name}</div>
        <div class="title">${m.title}</div>
        <div class="tags">${m.tags.map((t) => `<span class="chip">${t}</span>`).join('')}</div>
      `
      div.addEventListener('click', () => {
        location.href = `/student/chat.html?mentor=${m.id}`
      })
      grid.appendChild(div)
    })
  </script>
</body>
</html>
